name: Release

on:
  push:
    tags: ["v*"]
  # Manual runs exercise the whole pipeline including packaging, but stop
  # short of the upload (cargo publish --dry-run) — useful before a first tag.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: gate, verify tag, publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # The same four gates as ci.yml — never publish what CI would reject.
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: tests
        run: cargo test
      - name: rustdoc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

      - name: tag matches the crate version
        if: github.event_name == 'push'
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}" >&2
            exit 1
          fi

      - name: publish (dry run)
        if: github.event_name == 'workflow_dispatch'
        run: cargo publish --locked --dry-run

      # Needs the CARGO_REGISTRY_TOKEN repository secret: a crates.io API
      # token with publish scope (https://crates.io/settings/tokens).
      - name: publish to crates.io
        if: github.event_name == 'push'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
